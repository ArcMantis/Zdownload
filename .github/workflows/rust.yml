name: Rust Manual Build & Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须开启写入权限才能创建 Release

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev libwayland-dev libx11-dev
        sudo apt-get install -y binutils-mingw-w64-x86-64 gcc-mingw-w64-x86-64

    - name: Build Linux Release
      run: cargo build --release --verbose

    - name: Build Windows Release
      run: cargo build --release --target x86_64-pc-windows-gnu --verbose

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: manual-${{ github.run_id }}
        name: Manual Build ${{ github.run_id }}
        draft: false
        prerelease: false
        files: |
          target/release/zdownloadwin
          target/x86_64-pc-windows-gnu/release/zdownloadwin.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}