name: Rust Manual Build & Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 升级到 v6：原生支持 Node 24，安全且现代
    - uses: actions/checkout@v6

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev libwayland-dev libx11-dev
        sudo apt-get install -y binutils-mingw-w64-x86-64 gcc-mingw-w64-x86-64

    - name: Get Version from Cargo.toml
      id: get_version
      run: |
        # 提取 Cargo.toml 中的版本号并存入环境变量
        VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "v$VERSION"

    - name: Build Linux Release
      run: |
        cargo build --release
        # 重命名产物，加上版本和架构标识
        mv target/release/zdownloadwin zdownload-v${{ env.VERSION }}-x86_64-unknown-linux-gnu

    - name: Build Windows Release
      run: |
        cargo build --release --target x86_64-pc-windows-gnu
        # 重命名产物，加上版本和架构标识
        mv target/x86_64-pc-windows-gnu/release/zdownloadwin.exe zdownload-v${{ env.VERSION }}-x86_64-pc-windows-gnu.exe

    - name: Create Release and Upload Assets
      # 保持使用主版本号 @v2，静候作者或 GitHub 官方在 6 月份自动完成环境切换
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}-${{ github.run_number }}
        name: Release v${{ env.VERSION }}
        draft: false
        prerelease: false
        files: |
          zdownload-v${{ env.VERSION }}-x86_64-unknown-linux-gnu
          zdownload-v${{ env.VERSION }}-x86_64-pc-windows-gnu.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}